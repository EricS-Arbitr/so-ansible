---
# host_vars/router-0.yml — VyOS router (RC-VyOS-Router:1.1.0)
# Image: RC-VyOS-Router:1.1.0
# Interfaces:
#   eth1 Operations  172.16.8.1/24  (gateway)
#   eth2 Engineering 172.16.6.1/24  (gateway)
#   eth3 Services    172.16.7.1/24  (gateway)
#   eth4 security    172.16.5.1/24  (gateway)
# Mgmt: 10.255.240.165/20 (position LAST)
ansible_host: "10.255.240.165"
ansible_user: "vyos"
ansible_password: "{{ vault_vyos_password }}"
ansible_connection: "network_cli"
ansible_network_os: "vyos.vyos.vyos"
# Auth notes: SimSpace RC-VyOS-Router:1.1.0 uses `vyos / Simspace1!` (shorter
# form than the Linux lab password Simspace1!Simspace1!). Password from
# vault. If key-based auth is preferred later, drop a public key via
# `set system login user vyos authentication public-keys` and remove the
# password line here.

# Interfaces we want to mirror to the sensor via GRE. Verified 2026-07-22
# against live `show int` output on router-0 (RC-VyOS-Router:1.1.0 →
# VyOS 1.5-rolling-202410022214). Interface-to-subnet mapping is:
#   eth0 = Operations  (172.16.8.1/24)   ← mirror
#   eth1 = Engineering (172.16.6.1/24)   ← mirror
#   eth2 = Services    (172.16.7.1/24)   ← mirror
#   eth3 = security    (172.16.5.1/24)   ← SKIP: SO's own subnet, noise
#   eth4 = mgmt        (10.255.240.165)  ← SKIP: out-of-band
vyos_mirror_source_interfaces:
  - eth0   # Operations subnet ingress+egress
  - eth1   # Engineering subnet ingress+egress
  - eth2   # Services subnet (DC + AD)

# GRE tunnel to so-sensor-1.
vyos_gre_source_ip: "172.16.5.1"       # router's security-subnet IP
vyos_gre_remote_ip: "172.16.5.20"      # so-sensor-1 prod IP
vyos_gre_local_addr: "10.100.0.1"      # router-side of tunnel
vyos_gre_remote_addr: "10.100.0.2"     # sensor-side of tunnel
vyos_gre_tunnel_prefix: 30
