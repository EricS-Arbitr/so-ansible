---
# =========================================================================
# so_apt_mirror — nginx on ansible box serves SO source tarball to SO nodes.
# =========================================================================
# Scope reduced 2026-07-21: no ISO. Ubuntu SO 2.4 uses `so-setup network`
# (not iso airgap; that's CentOS-only), so we don't need to serve an ISO
# at all. SO nodes pull the source tarball from us during so_base, and
# packages come from upstream via corp proxy during so-setup.
# =========================================================================

# APT proxy must be configured BEFORE the first apt update, otherwise
# ubuntu.archive.ubuntu.com is unreachable through the range's mgmt plane.
# (First live dry-run on 2026-07-21 failed here with "Failed to update
# apt cache: unknown reason" because the RC_NG_Ansible image doesn't
# ship with apt proxy pre-configured — only env vars.)
- name: APT proxy for the ansible controller's own apt calls
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/95so-proxy
    mode: '0644'
    content: |
      # Added by so_apt_mirror role so apt-get can reach ubuntu.archive
      # through the range's mgmt-plane HTTP proxy.
      Acquire::http::Proxy "{{ so_mirror_proxy }}";
      Acquire::https::Proxy "{{ so_mirror_proxy }}";
      # Bypass proxy for local (loopback) fetches once nginx is up.
      Acquire::http::Proxy::127.0.0.1 "DIRECT";
      Acquire::http::Proxy::localhost "DIRECT";

- name: Install nginx + git (git needed to snapshot SO source)
  ansible.builtin.apt:
    name:
      - nginx
      - git
      - ca-certificates
    state: present
    update_cache: yes

- name: Mirror root + subdirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
    owner: www-data
    group: www-data
  loop:
    - "{{ so_mirror_root }}"
    - "{{ so_mirror_root }}/so-source"

# --- SO source tarball at pinned SHA -------------------------------------

- name: Check if SO source snapshot already exists
  ansible.builtin.stat:
    path: "{{ so_mirror_root }}/so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz"
  register: so_source_tarball

- name: Clone SO source at pinned SHA (temp dir; only runs if snapshot missing)
  ansible.builtin.git:
    repo: "{{ so_git_repo }}"
    dest: "/tmp/so_source_build"
    version: "{{ so_git_ref }}"
    depth: 1
    force: yes
  environment:
    HTTPS_PROXY: "{{ so_mirror_proxy }}"
    HTTP_PROXY: "{{ so_mirror_proxy }}"
  when: not so_source_tarball.stat.exists

- name: Tar the SO source snapshot into the mirror (excluding .git for size)
  ansible.builtin.command: >
    tar --exclude='.git' --exclude='.github'
    -czf {{ so_mirror_root }}/so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz
    -C /tmp/so_source_build .
  args:
    creates: "{{ so_mirror_root }}/so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz"
  when: not so_source_tarball.stat.exists

- name: Fix ownership on SO source tarball
  ansible.builtin.file:
    path: "{{ so_mirror_root }}/so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz"
    owner: www-data
    group: www-data
    mode: '0644'

- name: Clean up SO source build tree
  ansible.builtin.file:
    path: "/tmp/so_source_build"
    state: absent
  when: not so_source_tarball.stat.exists

# --- nginx config --------------------------------------------------------

- name: nginx site config for so-mirror
  ansible.builtin.template:
    src: nginx-so-mirror.conf.j2
    dest: /etc/nginx/sites-available/so-mirror
    mode: '0644'
  notify: reload nginx

- name: Enable so-mirror site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/so-mirror
    dest: /etc/nginx/sites-enabled/so-mirror
    state: link
  notify: reload nginx

- name: Disable nginx default site (would 502 our :80)
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Ensure nginx is running + enabled
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: yes

- name: Smoke test — SO source tarball reachable via HTTP
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ so_mirror_port }}/so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz"
    method: HEAD
    status_code: 200
  register: mirror_smoke
  changed_when: false
  retries: 3
  delay: 2

- name: Report mirror status
  ansible.builtin.debug:
    msg: |
      so-mirror OK on http://{{ so_mirror_host }}:{{ so_mirror_port }}/
        SO source: /so-source/securityonion-{{ so_git_ref[:12] }}.tar.gz
